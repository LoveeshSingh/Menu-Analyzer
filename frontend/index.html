<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container main-container mt-5">
        <header class="text-center mb-5 hero-text">
            <h1 class="display-4 fw-bold">Menu Analyzer</h1>
            <p class="lead text-muted">Intelligent insights for any menu or food item.</p>
        </header>

        <div class="row g-4">
            <!-- Scan Menu Card -->
            <div class="col-md-6">
                <div class="card glass-card p-3 p-md-4 h-100">
                    <h3 class="card-title fw-semibold mb-3">📸 Scan Menu</h3>
                    <p class="text-muted small">Upload an image of a menu to extract dishes and nutrition data automatically.</p>
                    <form id="scanMenuForm">
                        <div class="mb-3">
                            <input class="form-control file-input" type="file" id="menuImage" accept="image/*" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 action-btn">Analyze Menu</button>
                    </form>
                    <div id="scanLoading" class="mt-3 text-center d-none">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="small mt-2">Processing with OCR Engine...</p>
                    </div>
                </div>
            </div>

            <!-- Search Food Card -->
            <div class="col-md-6">
                <div class="card glass-card p-3 p-md-4 h-100">
                    <h3 class="card-title fw-semibold mb-3">🔍 Search Food</h3>
                    <p class="text-muted small">Directly search for nutritional info of specific meals or ingredients.</p>
                    <form id="searchFoodForm">
                        <div class="input-group mb-3">
                            <input type="text" id="searchQuery" class="form-control custom-input" placeholder="e.g. 100g Grilled Chicken" required>
                        </div>
                        <button type="submit" class="btn btn-secondary w-100 action-btn">Search Info</button>
                    </form>
                    <div id="searchLoading" class="mt-3 text-center d-none">
                        <div class="spinner-border text-secondary" role="status"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12" id="resultsContainer">
                <!-- Results will be injected here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
